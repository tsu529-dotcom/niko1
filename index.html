<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>議事録ジェネレーター｜工務店向け</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;700&display=swap');

  :root {
    --ink: #1a1a1a;
    --paper: #f5f0e8;
    --accent: #c0392b;
    --accent2: #8b6914;
    --border: #c8b89a;
    --muted: #7a6a55;
    --white: #fff;
    --shadow: rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  header {
    background: var(--ink);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 3px solid var(--accent);
  }
  header .logo-icon { font-size: 22px; }
  header h1 { font-family: 'Shippori Mincho', serif; font-size: 20px; color: var(--white); letter-spacing: 0.1em; }
  header span { font-size: 11px; color: var(--border); letter-spacing: 0.15em; margin-left: 6px; }

  .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

  .input-section {
    background: var(--white);
    border: 1px solid var(--border);
    border-top: 3px solid var(--accent2);
    padding: 28px;
    margin-bottom: 24px;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  @media (max-width: 600px) { .meta-grid { grid-template-columns: 1fr; } }

  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
  .field input, .field select {
    width: 100%;
    border: 1px solid var(--border);
    background: var(--paper);
    padding: 10px 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent2); background: #fff; }

  /* 日時ピッカー専用 */
  .datetime-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: end;
  }
  .datetime-row .field-date input[type="date"],
  .datetime-row .field-time input[type="time"] {
    padding: 10px 10px;
    font-size: 14px;
  }
  .datetime-row .sep {
    font-size: 13px;
    color: var(--muted);
    padding-bottom: 12px;
    white-space: nowrap;
  }
  .time-range {
    display: grid;
    grid-template-columns: 1fr 16px 1fr;
    gap: 4px;
    align-items: center;
  }
  .time-range .range-sep { text-align: center; font-size: 12px; color: var(--muted); }

  textarea#transcript {
    width: 100%;
    height: 180px;
    border: 1px solid var(--border);
    background: var(--paper);
    padding: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--ink);
    resize: vertical;
    outline: none;
    line-height: 1.7;
    transition: border-color 0.2s;
  }
  textarea#transcript:focus { border-color: var(--accent2); background: #fff; }
  textarea#transcript::placeholder { color: #bbb; }

  .btn-generate {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: var(--white);
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.15em;
    cursor: pointer;
    margin-top: 20px;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-generate:hover { background: #a93226; }
  .btn-generate:disabled { background: #ccc; cursor: not-allowed; }

  .loading { display: none; text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
  .loading.show { display: block; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #output-section {
    display: none;
    background: var(--white);
    border: 1px solid var(--border);
    border-top: 3px solid var(--accent);
    padding: 36px;
    box-shadow: 0 2px 8px var(--shadow);
    margin-bottom: 24px;
  }
  #output-section.show { display: block; }

  .minutes-header { text-align: center; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 2px solid var(--ink); }
  .minutes-header .doc-title { font-family: 'Shippori Mincho', serif; font-size: 26px; font-weight: 700; letter-spacing: 0.3em; margin-bottom: 6px; }

  .minutes-meta-box {
    border: 1px solid var(--border);
    background: var(--paper);
    padding: 14px 18px;
    margin-bottom: 28px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 24px;
  }
  .meta-row { display: flex; gap: 8px; font-size: 13px; align-items: baseline; }
  .meta-key { font-weight: 700; color: var(--muted); white-space: nowrap; min-width: 64px; }

  .minutes-body h2 {
    font-family: 'Shippori Mincho', serif;
    font-size: 14px; font-weight: 700;
    padding: 7px 12px;
    background: var(--ink); color: var(--white);
    margin: 26px 0 12px; letter-spacing: 0.1em;
  }
  .minutes-body h3 { font-size: 13px; font-weight: 700; color: var(--accent2); margin: 16px 0 6px; padding-left: 10px; border-left: 3px solid var(--accent2); }
  .minutes-body p { font-size: 13px; line-height: 1.9; margin-bottom: 8px; }
  .minutes-body ul { padding-left: 0; margin-bottom: 10px; list-style: none; }
  .minutes-body ul li { font-size: 13px; line-height: 1.8; padding: 4px 0 4px 18px; position: relative; border-bottom: 1px dotted var(--border); }
  .minutes-body ul li::before { content: '▸'; color: var(--accent); position: absolute; left: 0; font-size: 10px; top: 7px; }
  .minutes-body table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  .minutes-body table th { background: var(--ink); color: var(--white); padding: 7px 10px; text-align: left; font-weight: 500; }
  .minutes-body table td { padding: 7px 10px; border: 1px solid var(--border); vertical-align: top; }
  .minutes-body table tr:nth-child(even) td { background: var(--paper); }

  .stamp-area { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }
  .stamp-box { width: 60px; height: 60px; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 4px; }
  .stamp-label { font-size: 9px; color: var(--muted); }

  .action-buttons { display: flex; gap: 12px; margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .btn-action {
    padding: 11px 22px;
    border: 1px solid var(--ink);
    background: transparent;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer; letter-spacing: 0.08em;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-action:hover { background: var(--ink); color: var(--white); }
  .btn-action.pdf-btn { background: var(--accent); color: var(--white); border-color: var(--accent); }
  .btn-action.pdf-btn:hover { background: #a93226; }

  .error-msg { display: none; background: #fdf0f0; border-left: 4px solid var(--accent); padding: 12px 16px; font-size: 13px; color: var(--accent); margin-top: 16px; }
  .error-msg.show { display: block; }

  @media print {
    @page { size: A4; margin: 18mm 20mm; }
    body { background: #fff !important; }
    header, .input-section, .loading, .action-buttons { display: none !important; }
    #output-section { display: block !important; border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; }
    .minutes-body table th, .minutes-body h2 { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    table { page-break-inside: avoid; }
    h2 { page-break-after: avoid; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">📋</div>
  <h1>議事録ジェネレーター <span>for 工務店</span></h1>
</header>

<div class="container">
  <div class="input-section">
    <div class="section-label">基本情報</div>

    <!-- 日時（カレンダー選択） -->
    <div class="field" style="margin-bottom:16px;">
      <label>📅 日時</label>
      <div style="display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; flex-wrap:wrap;">
        <input type="date" id="meeting-date" style="width:100%; border:1px solid var(--border); background:var(--paper); padding:10px 12px; font-family:'Noto Sans JP',sans-serif; font-size:14px; color:var(--ink); outline:none;">
        <div class="time-range" style="display:flex; align-items:center; gap:6px; white-space:nowrap;">
          <input type="time" id="meeting-time-start" style="border:1px solid var(--border); background:var(--paper); padding:10px 8px; font-family:'Noto Sans JP',sans-serif; font-size:14px; color:var(--ink); outline:none; width:110px;">
          <span style="color:var(--muted); font-size:13px;">〜</span>
          <input type="time" id="meeting-time-end" style="border:1px solid var(--border); background:var(--paper); padding:10px 8px; font-family:'Noto Sans JP',sans-serif; font-size:14px; color:var(--ink); outline:none; width:110px;">
        </div>
      </div>
    </div>

    <div class="meta-grid">
      <div class="field">
        <label>🏗️ 現場名・案件名</label>
        <input type="text" id="project-name" placeholder="例：○○様邸 新築工事">
      </div>
      <div class="field">
        <label>📍 打ち合わせ場所</label>
        <input type="text" id="project-location" placeholder="例：現場、事務所、○○様宅">
      </div>
      <div class="field">
        <label>🔧 工程フェーズ</label>
        <select id="project-phase">
          <option value="">（選択してください）</option>
          <option>設計打合せ</option>
          <option>着工前打合せ</option>
          <option>基礎工事</option>
          <option>上棟</option>
          <option>内装工事</option>
          <option>外装工事</option>
          <option>設備工事</option>
          <option>竣工検査</option>
          <option>引渡し</option>
          <option>その他</option>
        </select>
      </div>
      <div class="field">
        <label>📋 会議の種類</label>
        <input type="text" id="meeting-type" placeholder="例：定例会議、現場打合せ">
      </div>
      <div class="field">
        <label>👥 出席者</label>
        <input type="text" id="attendees" placeholder="例：田中（現場）、鈴木（設計）、山田様（施主）">
      </div>
      <div class="field">
        <label>✏️ 議事録作成者</label>
        <input type="text" id="author" placeholder="例：田中">
      </div>
    </div>

    <div class="section-label" style="margin-top: 8px;">文字起こしテキスト</div>
    <textarea id="transcript" placeholder="ここにAppleメモアプリの文字起こしテキストを貼り付けてください。

「えー」「まあ」などの口語表現はAIが自動で整理します。そのままペーストしてOKです。"></textarea>

    <button class="btn-generate" id="generate-btn" onclick="generateMinutes()">
      ⚡ 議事録を生成する
    </button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    議事録を作成しています...しばらくお待ちください
  </div>

  <div id="output-section">
    <div class="minutes-header">
      <div class="doc-title">議　事　録</div>
    </div>
    <div class="minutes-meta-box" id="out-meta"></div>
    <div class="minutes-body" id="out-body"></div>
    <div class="stamp-area">
      <div class="stamp-box"><div class="stamp-label">確　認</div></div>
      <div class="stamp-box"><div class="stamp-label">承　認</div></div>
      <div class="stamp-box"><div class="stamp-label">作　成</div></div>
    </div>
    <div class="action-buttons">
      <button class="btn-action pdf-btn" onclick="downloadPDF()">📄 PDFとして保存</button>
      <button class="btn-action" onclick="copyText()">📋 テキストをコピー</button>
      <button class="btn-action" onclick="resetForm()">🔄 新しく作成</button>
    </div>
  </div>
</div>

<script>
function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  const week = ['日','月','火','水','木','金','土'][new Date(dateStr).getDay()];
  return `${y}年${parseInt(m)}月${parseInt(d)}日（${week}）`;
}

function buildDateTimeString() {
  const d = document.getElementById('meeting-date').value;
  const s = document.getElementById('meeting-time-start').value;
  const e = document.getElementById('meeting-time-end').value;
  let str = formatDate(d) || '（未記入）';
  if (s) str += '　' + s;
  if (s && e) str += '〜' + e;
  else if (e) str += '〜' + e;
  return str;
}

async function generateMinutes() {
  const transcript = document.getElementById('transcript').value.trim();
  if (!transcript) { showError('文字起こしテキストを入力してください。'); return; }

  const datetime  = buildDateTimeString();
  const project   = document.getElementById('project-name').value || '（未記入）';
  const location  = document.getElementById('project-location').value || '';
  const phase     = document.getElementById('project-phase').value || '';
  const attendees = document.getElementById('attendees').value || '（未記入）';
  const author    = document.getElementById('author').value || '';
  const meetType  = document.getElementById('meeting-type').value || '打合せ';

  hideError();
  document.getElementById('generate-btn').disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('output-section').classList.remove('show');

  const prompt = `あなたは工務店の優秀な事務スタッフです。以下の文字起こしテキストから工務店向け議事録をHTML形式で作成してください。

【会議情報】
日時：${datetime} / 案件名：${project} / 打合せ場所：${location} / 工程：${phase}
出席者：${attendees} / 作成者：${author} / 種別：${meetType}

【文字起こし】
${transcript}

【出力ルール】
- HTMLタグのみ出力。説明文・コードブロック記号は不要
- 「えー」「まあ」「ええと」などのフィラー語は除去
- 工務店・建設業の専門用語はそのまま正確に記載
- 担当者・期日が不明な場合は「要確認」と記載

【出力HTML構造（この通りに出力）】
<h2>議事内容</h2>
（話し合われた内容をh3とulで項目ごとに整理）

<h2>決定事項</h2>
<ul><li>決定した内容</li></ul>

<h2>ToDoリスト・次のアクション</h2>
<table>
<thead><tr><th>No.</th><th>作業内容</th><th>担当者</th><th>期日</th><th>備考</th></tr></thead>
<tbody><tr><td>1</td><td>内容</td><td>担当</td><td>期日</td><td>備考</td></tr></tbody>
</table>

<h2>次回予定</h2>
<p>次回の会議予定（なければ「未定」）</p>`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    let html = data.content.map(i => i.text || '').join('').trim();
    html = html.replace(/```html?/gi, '').replace(/```/g, '').trim();

    document.getElementById('out-meta').innerHTML = `
      <div class="meta-row"><span class="meta-key">日　時</span><span>${datetime}</span></div>
      <div class="meta-row"><span class="meta-key">案件名</span><span>${project}</span></div>
      ${location  ? `<div class="meta-row"><span class="meta-key">打合せ場所</span><span>${location}</span></div>` : ''}
      ${phase     ? `<div class="meta-row"><span class="meta-key">工　程</span><span>${phase}</span></div>` : ''}
      <div class="meta-row"><span class="meta-key">出席者</span><span>${attendees}</span></div>
      ${author    ? `<div class="meta-row"><span class="meta-key">作成者</span><span>${author}</span></div>` : ''}
      <div class="meta-row"><span class="meta-key">種　別</span><span>${meetType}</span></div>`;
    document.getElementById('out-body').innerHTML = html;
    document.getElementById('output-section').classList.add('show');
    document.getElementById('output-section').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch(e) {
    showError('生成中にエラーが発生しました。もう一度お試しください。');
  } finally {
    document.getElementById('generate-btn').disabled = false;
    document.getElementById('loading').classList.remove('show');
  }
}

function downloadPDF() {
  const isIOS = /iPhone|iPad/.test(navigator.userAgent);
  const isMac = /Mac/.test(navigator.userAgent) && !isIOS;
  const hint = isMac ? '「プリンタ」で「PDFとして保存」を選んでください。'
    : isIOS ? '「オプション」→「PDFを保存」を選んでください。'
    : '「プリンター」で「Microsoft Print to PDF」を選んでください。';
  alert('📄 印刷ダイアログが開きます。\n\n' + hint + '\n\n用紙サイズ：A4');
  window.print();
}

function copyText() {
  const text = '議事録\n\n'
    + document.getElementById('out-meta').innerText + '\n\n'
    + document.getElementById('out-body').innerText;
  navigator.clipboard.writeText(text)
    .then(() => alert('コピーしました！'))
    .catch(() => alert('コピーに失敗しました。手動で選択してコピーしてください。'));
}

function resetForm() {
  ['transcript','meeting-date','meeting-time-start','meeting-time-end',
   'project-name','project-location','attendees','author','meeting-type'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('project-phase').value = '';
  document.getElementById('output-section').classList.remove('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showError(msg) { const el = document.getElementById('error-msg'); el.textContent = msg; el.classList.add('show'); }
function hideError() { document.getElementById('error-msg').classList.remove('show'); }
</script>
</body>
</html>
